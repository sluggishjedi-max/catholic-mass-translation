    function getTargetDate() {
        let d = new Date();
        if (d.getDay() === 6 && d.getHours() >= 16) {
            d.setDate(d.getDate() + 1);
        }
        return d;
    }

    function computeEasterSunday(year) {
        const a = year % 19;
        const b = Math.floor(year / 100);
        const c = year % 100;
        const d = Math.floor(b / 4);
        const e = b % 4;
        const f = Math.floor((b + 8) / 25);
        const g = Math.floor((b - f + 1) / 3);
        const h = (19 * a + b - d - g + 15) % 30;
        const i = Math.floor(c / 4);
        const k = c % 4;
        const l = (32 + 2 * e + 2 * i - h - k) % 7;
        const m = Math.floor((a + 11 * h + 22 * l) / 451);
        const month = Math.floor((h + l - 7 * m + 114) / 31);
        const day = ((h + l - 7 * m + 114) % 31) + 1;
        return new Date(year, month - 1, day);
    }

    function isEasterOrPentecost(date) {
        const y = date.getFullYear();
        const easter = computeEasterSunday(y);
        const pentecost = new Date(easter);
        pentecost.setDate(easter.getDate() + 49); 
        return (date.getFullYear() === easter.getFullYear() && date.getMonth() === easter.getMonth() && date.getDate() === easter.getDate()) ||
               (date.getFullYear() === pentecost.getFullYear() && date.getMonth() === pentecost.getMonth() && date.getDate() === pentecost.getDate());
    }

        if (state.locMode === 'AUTO') {

                const lon = pos.coords.longitude;
                state.currentLoc = (lat > 33 && lat < 39 && lon > 124 && lon < 132) ? 'KR' : 'VN';
                render();
            }, () => {
                state.currentLoc = 'VN';
                render();
            });
        } else {
            state.currentLoc = state.locMode;
            render();
        }
    }

    function formatBibleCit(cit, toVN) {
        if (!cit || !toVN) return cit;
        let converted = cit;
        
        // 1. 성경 권 이름 변환 (긴 명칭부터 처리하여 1요한/요한 중복 방지)
        const sortedKeys = Object.keys(bibleMap).sort((a, b) => b.length - a.length);
        for (let kr of sortedKeys) {
            if (converted.includes(kr)) {
                converted = converted.replace(kr, bibleMap[kr]);
                break; 
            }
        }

        // 2. 한국어 첨자 변환 (ㄱ->a, ㄴ->b 등)
        for (let krChar in suffixMap) {
            if (converted.includes(krChar)) {
                converted = converted.split(krChar).join(suffixMap[krChar]);
            }
        }
        return converted;
    }

    function formatCit(cit, toVN) {
        return formatBibleCit(cit, toVN);

                    col.innerHTML += genLine(line, isKR, true);

                });

    function genHeader(orig, data, isKR, isMain) {
        const title = isKR ? data.header.kr : data.header.vn;
        let cit = '';
        if (showCitIds.includes(orig.id) || orig.id === 'entrance') {
            cit = data.header.cit || '';
            cit = formatCit(cit, !isKR);
        }
        
        let selectHtml = '';
        if (orig.type === 'selectable' && isMain) {
            selectHtml = `<select class="select-inline" onchange="optChange('${orig.id}', this.value)">`;
            for (let k in orig.variants) selectHtml += `<option value="${k}" ${state.options[orig.id]===k?'selected':''}>${orig.variants[k].label}</option>`;
            selectHtml += `</select>`;
        }
        if (orig.id === 'eucharist' && isMain) {
            const disabled = state.options[orig.id] === '4' ? 'disabled' : '';
            selectHtml += ` <select class="select-inline" onchange="optChange('eucharist_song', this.value)" ${disabled}>
                                <option value="songA" ${state.options.eucharist_song==='songA'?'selected':''}>연중주일 감사송 1 : 파스카 신비와 하느님 백성</option>
                                <option value="songB" ${state.options.eucharist_song==='songB'?'selected':''}>연중주일 감사송 2 : 구원의 신비</option>
                                <option value="songC" ${state.options.eucharist_song==='songC'?'selected':''}>연중주일 감사송 3 : 사람이신 그리스도를 통한 인류 구원</option>
                                <option value="songD" ${state.options.eucharist_song==='songD'?'selected':''}>사순 감사송 1 : 사순 시기의 영성적 의미</option>
                                <option value="songE" ${state.options.eucharist_song==='songE'?'selected':''}>....</option>
                                <option value="songF" ${state.options.eucharist_song==='songF'?'selected':''}>....</option>
                            </select>`;
        }

        return `<div class="part-header">
                    <div class="part-title-group"><span class="part-title">${title}</span> ${selectHtml}</div>
                    ${cit ? `<span class="citation">${cit}</span>` : ''}
                </div>`;
    }

    function genLine(line, isLineKR, isMainSide) {
        let sp = isLineKR ? line.sp_kr : line.sp_vn;
        let txt = isLineKR ? line.text_kr : line.text_vn;
        const isTargetLang = (state.currentLoc === 'KR' && !isLineKR) || (state.currentLoc === 'VN' && isLineKR);
        let isAIApplied = false;

        if ((!txt || txt.trim() === '') && ((isLineKR && line.text_kr_ai) || (!isLineKR && line.text_vn_ai))) {
            txt = isLineKR ? line.text_kr_ai : line.text_vn_ai;
            isAIApplied = true;
        }

        if (state.transMode === 'ai' && isTargetLang) {
            if (isLineKR && line.text_kr_ai) { txt = line.text_kr_ai; isAIApplied = true; }
            if (!isLineKR && line.text_vn_ai) { txt = line.text_vn_ai; isAIApplied = true; }
        }
        
        if (!txt && !sp) return '';

        const aiBadge = isAIApplied ? `<span class="ai-badge">AI</span>` : '';
        const txtClass = isAIApplied ? 'text text-ai' : 'text';

        return `<div class="dialogue ${isMainSide?'':'is-sub'}">
                    <div class="speaker">${sp}</div>
                    <div class="${txtClass}">${aiBadge}${txt}</div>
                </div>`;
    }

    window.setLocMode = (m) => {
        state.locMode = m;
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(`mode-${m}`);
        if(btn) btn.classList.add('active');
        if (m==='AUTO') {
            navigator.geolocation.getCurrentPosition(p => { state.currentLoc = p.coords.latitude > 30 ? 'KR':'VN'; render(); }, 
            () => { state.currentLoc='VN'; render(); });
        } else { state.currentLoc = m; render(); }
    };
    window.toggleLayout = () => { state.layout = state.layout === 'split' ? 'stacked' : 'split'; render(); };
    window.toggleTrans = () => { state.transMode = state.transMode === 'official' ? 'ai' : 'official'; render(); };
    window.optChange = (id, val) => { state.options[id] = val; render(); };

    setLocMode('AUTO');
</script>
